<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Vehicle Man Industrial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap');

        :root {
            --industry-blue: #3b82f6;
        }

        body { 
            background-color: #1a1c20; 
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .main-bg {
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('Background_wall.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            z-index: -1;
        }

        .main-bg::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 30%, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%);
        }

        /* NAVIGATION STYLES */
        .nav-glass {
            background: rgba(26, 28, 32, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .industrial-card {
            background: rgba(30, 32, 36, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 4px;
        }

        .header-font { font-family: 'Orbitron', sans-serif; }

        .contact-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .contact-input:focus {
            border-color: var(--industry-blue);
            outline: none;
        }

        .btn-send {
            background: linear-gradient(180deg, #3b82f6 0%, #1d4ed8 100%);
            border: 1px solid #2563eb;
            transition: all 0.2s ease;
        }

        .btn-send:hover {
            filter: brightness(1.1);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }

        .rivet {
            width: 8px; height: 8px;
            background: #444; border-radius: 50%;
            box-shadow: inset 0 1px 2px black;
            position: absolute;
        }
    </style>
</head>
<body>
    <div class="main-bg"></div>

    <nav class="nav-glass fixed w-full z-[200]">
        <div class="max-w-7xl mx-auto px-4 md:px-8 py-4 flex items-center justify-between">
            <div class="flex items-center">
                <button id="menu-btn" class="block md:hidden text-white focus:outline-none p-2 mr-4">
                    <i class="fas fa-bars text-2xl"></i>
                </button>
                <div class="hidden md:flex space-x-8 text-[10px] font-bold uppercase tracking-widest">
                    <a href="index.html" class="hover:text-blue-400 transition">Αρχική</a>
                    <a href="company.html" class="hover:text-blue-400 transition">Η Εταιρεία μας</a>
                    <a href="legal.html" class="hover:text-blue-400 transition">Legal Notes</a>
                    <a href="promode.html" class="hover:text-blue-400 transition">Pro Mode</a>
                    <a href="manual.html" class="text-yellow-500 hover:text-yellow-400 transition">ΕΓΧΕΙΡΙΔΙΟ ΧΡΗΣΗΣ</a>
                    <a href="contact.html" class="text-blue-400 underline decoration-2 underline-offset-8">Επικοινωνία</a>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="hidden sm:flex flex-col items-end">
                    <span class="text-[8px] text-slate-500 uppercase tracking-widest font-black">System Status</span>
                    <span class="text-[10px] text-blue-500 font-bold font-mono uppercase">v4.9.0-LIVE</span>
                </div>
                <div class="h-2 w-2 bg-blue-500 rounded-full animate-pulse"></div>
            </div>
        </div>

        <div id="mobile-menu" class="hidden absolute top-[70px] left-4 right-4 bg-[#1a1c20] border border-white/10 shadow-2xl rounded-xl overflow-hidden">
            <div class="flex flex-col p-6 space-y-4 text-[11px] font-bold uppercase tracking-widest">
                <a href="index.html" class="flex items-center gap-3 py-2 border-b border-white/5"><i class="fas fa-home text-blue-500"></i> Αρχική</a>
                <a href="company.html" class="flex items-center gap-3 py-2 border-b border-white/5"><i class="fas fa-building text-blue-500"></i> Η Εταιρεία μας</a>
                <a href="promode.html" class="flex items-center gap-3 py-2 border-b border-white/5"><i class="fas fa-crown text-blue-500"></i> Pro Mode</a>
                <a href="manual.html" class="flex items-center gap-3 py-2 border-b border-white/5 text-yellow-500"><i class="fas fa-book"></i> ΕΓΧΕΙΡΙΔΙΟ ΧΡΗΣΗΣ</a>
                <a href="contact.html" class="flex items-center gap-3 py-2 text-blue-400"><i class="fas fa-envelope"></i> Επικοινωνία</a>
            </div>
        </div>
    </nav>

    <main class="relative z-10 max-w-5xl mx-auto px-6 pt-32 pb-20">
        <header class="text-center mb-16">
            <div class="mb-8 flex justify-center">
                <img src="Vehicle_man_logo.jpg" alt="Vehicle Man Logo" class="h-32 md:h-40 rounded-xl shadow-2xl border border-white/5">
            </div>
            <h1 class="header-font text-3xl md:text-5xl font-black uppercase tracking-tighter mb-4">
                Κεντρο <span class="text-blue-500">Επικοινωνιας</span>
            </h1>
            <div class="h-[2px] w-48 bg-blue-500 mx-auto mb-6"></div>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.4em] font-bold">
                Industrial Fleet Support System
            </p>
        </header>

        <div class="industrial-card relative p-8 md:p-12">
            <div class="rivet top-4 left-4"></div>
            <div class="rivet top-4 right-4"></div>
            <div class="rivet bottom-4 left-4"></div>
            <div class="rivet bottom-4 right-4"></div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
                <div class="md:col-span-1 space-y-8">
                    <div class="bg-black/20 p-6 border-l-4 border-blue-600">
                        <h4 class="header-font text-[10px] font-bold text-blue-500 uppercase tracking-widest mb-2">Direct Mail</h4>
                        <p class="text-xs font-mono text-slate-300 break-all">vehiclemanagement@duck.com</p>
                    </div>
                    
                    <div class="space-y-4">
                        <div class="flex items-center gap-3">
                            <i class="fas fa-microchip text-blue-500 text-xs"></i>
                            <span class="text-[10px] uppercase font-bold tracking-widest text-slate-400">Automated Routing</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <i class="fas fa-shield-alt text-blue-500 text-xs"></i>
                            <span class="text-[10px] uppercase font-bold tracking-widest text-slate-400">Encrypted Relay</span>
                        </div>
                    </div>
                </div>

                <div class="md:col-span-2">
                    <form action="mailto:vehiclemanagement@duck.com" method="GET" enctype="text/plain" class="space-y-6">
                        <div class="space-y-2">
                            <label class="text-[9px] uppercase font-black tracking-[0.2em] text-slate-500">Subject / Θέμα</label>
                            <input type="text" name="subject" required placeholder="Περιγράψτε σύντομα..." 
                                class="contact-input w-full p-4 text-sm font-bold uppercase tracking-widest">
                        </div>
                        
                        <div class="space-y-2">
                            <label class="text-[9px] uppercase font-black tracking-[0.2em] text-slate-500">Message / Μήνυμα</label>
                            <textarea name="body" required rows="6" 
                                placeholder="Γράψτε το μήνυμά σας εδώ..." 
                                class="contact-input w-full p-4 text-sm"></textarea>
                        </div>

                        <button type="submit" class="btn-send w-full py-5 text-[10px] font-black uppercase tracking-[0.3em] text-white flex items-center justify-center gap-3">
                            <i class="fas fa-external-link-alt"></i> ΑΝΟΙΓΜΑ EMAIL CLIENT (OUTLOOK/GMAIL)
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Simple Mobile Menu Toggle
        const menuBtn = document.getElementById('menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');

        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });
    </script>
</body>
</html>
